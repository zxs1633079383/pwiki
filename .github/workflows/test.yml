name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke test (CLI)
        run: pytest -q tests/

      - name: Verify version flag
        run: pwiki --version

      - name: Verify each subcommand --help
        run: |
          for cmd in sync aliases canvas brief evolution; do
            echo "==> pwiki $cmd --help"
            pwiki $cmd --help
          done
